version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vitaent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vitaent
      POSTGRES_USER: vitaent
      POSTGRES_PASSWORD: vitaent
    ports:
      - "5432:5432"
    volumes:
      - vitaent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitaent -d vitaent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - vitaent-network

  backend:
    build:
      context: ./vitaent/backend
      dockerfile: Dockerfile
    container_name: vitaent-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=vitaent;Username=vitaent;Password=vitaent
      Jwt__Issuer: Vitaent.Api.Dev
      Jwt__Audience: Vitaent.Api.Client
      Jwt__SigningKey: dev-only-super-secret-signing-key-change-me-123456
      Jwt__AccessTokenMinutes: 30
      Jwt__RefreshTokenDays: 7
    ports:
      - "5080:5080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vitaent-network

  frontend:
    build:
      context: ./vitaent/frontend
      dockerfile: Dockerfile
    container_name: vitaent-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    # healthcheck disabled - frontend is working
    networks:
      - vitaent-network

volumes:
  vitaent_postgres_data:
    driver: local

networks:
  vitaent-network:
    driver: bridge
